<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - GeoAttendance Pro</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-map-marker-alt"></i>
                GeoAttendance Pro
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="signup.html" class="nav-link">Sign Up</a>
                </li>
                <li class="nav-item">
                    <a href="admin-login.html" class="nav-link admin-btn">Admin Login</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="form-container">
        <div class="form-box">
            <h2 class="form-title">
                <i class="fas fa-user"></i> User Login
            </h2>
            


            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn primary-btn" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </button>
            </form>



            <div style="text-align: center; margin-top: 1rem;">
                <a href="signup.html" style="color: rgba(255, 255, 255, 0.8); text-decoration: none;">
                    Don't have an account? Sign up here
                </a>
            </div>
            <div style="text-align: center; margin-top: 0.5rem;">
                <a href="admin-login.html" style="color: rgba(255, 255, 255, 0.8); text-decoration: none;">
                    Admin Login
                </a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const button = e.target.querySelector('button');
            UIUtils.setLoading(button, true);

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const result = await ApiService.login(username, password);
                
                if (result.message === 'Login successful') {
                    AuthService.setUser({ username });
                    UIUtils.showAlert('Login successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        if (username === 'admin') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'user-dashboard.html';
                        }
                    }, 1000);
                }
            } catch (error) {
                UIUtils.showAlert(error.message, 'error');
            } finally {
                UIUtils.setLoading(button, false);
            }
        });

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            if (AuthService.isLoggedIn()) {
                if (AuthService.isAdmin()) {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'user-dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
